[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build --workspace=packages/shared-types && npm run build --workspace=apps/scraper-backend && npx --prefix apps/scraper-backend playwright install chromium --with-deps"

[deploy]
startCommand = "node apps/scraper-backend/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 3
